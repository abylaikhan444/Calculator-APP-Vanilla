<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalculatorAPP</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/calculator-button.css">
    <link rel="stylesheet" href="/css/result.css">
</head>
<body>
    <div class="calculator__box">
        <div class="calculator__part-1">
            <div class="calculator__par-1__write-box">
                
            </div>
            <div class="calculator__par-1__result-box">
                
            </div>
        </div>
        <div class="calculator__part-2">
            <button class="btn theme" id="btn-theme">☾</button>
            <button class="btn" id="btn-percent">%</button>
            <button class="btn" id="btn-divide">÷</button>
            <button class="btn" id="btn-multiple">×</button>

            <button class="btn" id="btn-7">7</button>
            <button class="btn" id="btn-8">8</button>
            <button class="btn" id="btn-9">9</button>
            <button class="btn" id="btn-minus">−</button>

            <button class="btn" id="btn-4">4</button>
            <button class="btn" id="btn-5">5</button>
            <button class="btn" id="btn-6">6</button>
            <button class="btn" id="btn-plus">+</button>

            <button class="btn" id="btn-1">1</button>
            <button class="btn" id="btn-2">2</button>
            <button class="btn" id="btn-3">3</button>
            <button class="btn equal" id="btn-equal">=</button>

            <button class="btn ac" id="btn-ac">AC</button>
            <button class="btn" id="btn-0">0</button>
            <button class="btn" id="btn-dot">.</button>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
